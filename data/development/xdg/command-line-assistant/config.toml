[database]
type = "sqlite"
connection_string = "~/.local/state/command-line-assistant/history.db"

[history]
enabled = true

[backend]
# Ollama OpenAI-compatible endpoint (default Ollama port)
endpoint = "http://localhost:11434/v1"
timeout = 60
backend_format = "openai"
model = "llama3"
# proxies = { http = "http://localhost:8002", https = "https://localhost:8002" }

[backend.auth]
# auth_type: "none" (local), "token" (API key), or "cert" (mTLS / RHSM)
auth_type = "none"
verify_ssl = false

[logging]
level = "INFO"

[logging.audit]
enabled = false
