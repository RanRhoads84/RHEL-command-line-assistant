# History Database settings. By default, sqlite is used.
[database]
# Available types for databases are: sqlite, postgresql and mysql. Mariadb can
# be used as well with "mysql" type.
type = "sqlite"
# Connection string refers to the path where the sqlite database will be
# placed. Only available with sqlite type.
connection_string = "/var/lib/command-line-assistant/history.db"

# In order to use postgresql, uncomment the following settings:
# [database]
# type = "postgresql"
# host = "localhost"
# port = "5432"
# username = "your-user"
# password = "your-password"
# database = "history"

# Or, to use mysql, uncomment the following:
# [database]
# type = "mysql"
# host = "localhost"
# port = "3306"
# username = "your-user"
# password = "your-password"
# database = "history"

# History management configuration
[history]
# If the history for all conversation should be enabled or not. By default,
# this is enabled and will store in a database defined under
# [database]. The conversation is stored per-user.
enabled = true

# Backend settings for communicating with the LLM API.
[backend]
# Ollama OpenAI-compatible endpoint. Change to your local backend URL.
# For Ollama: http://localhost:11434/v1
# For llama.cpp: http://localhost:8080/v1
# For Red Hat Lightspeed: https://cert.console.redhat.com/api/lightspeed/v1
endpoint = "http://localhost:11434/v1"
# HTTP request timeout in seconds (increase for slow CPU inference)
timeout = 60
# API format: "openai" for Ollama/llama.cpp/OpenAI-compatible, "rhsm" for Red Hat Lightspeed
backend_format = "openai"
# Model name to use (for openai backend_format only)
model = "llama3"
# Define https proxy to route the request through it.
# proxies = { http = "http://example-host:8002", https = "https://example-host:8002" }

# Configure authentication settings for backend
[backend.auth]
# auth_type: "none" for local backends, "token" for API key, "cert" for mTLS (RHSM)
auth_type = "none"
# api_key = ""       # set when auth_type = "token"
# cert_file = ""     # set when auth_type = "cert"
# key_file = ""      # set when auth_type = "cert"
# Set to true only when connecting to a remote backend with a valid TLS certificate
verify_ssl = false

# Logging configuration settings
[logging]
# The default logging level for all messages logged by CLAD.
level = "INFO"

# Audit logging settings
[logging.audit]
# If enabled, we will log audit tracing to journald.
enabled = false
